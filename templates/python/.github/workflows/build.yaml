name: Build

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'release/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VER }}

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Calculate Docker Tag
        id: tag
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}

          if [[ "$BRANCH" == feature/* ]]; then
            TAG=$(echo $GITHUB_SHA | cut -c1-7)

          elif [[ "$BRANCH" == "develop" ]]; then
            TAG=develop

          elif [[ "$BRANCH" == release/* ]]; then
            TAG=$(echo $BRANCH | sed 's|release/||')

          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA} \
            -t ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.tag }} \
            -t ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:latest \
            .

      - name: Push Image
        run: |
          docker push ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA}

          docker push ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.tag }}

          docker push ${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:latest

      - name: Build Summary
        run: |
          echo "Image pushed:"
          echo "${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${GITHUB_SHA}"
