replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi

  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true

env:
  APP_ENV: prod

config:
  LOG_LEVEL: INFO

secret:
  DATABASE_PASSWORD: stage-password
