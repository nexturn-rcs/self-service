replicaCount: 1

image:
  repository: ""
  tag: ""

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

container:
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  className: nginx

  annotations: {}

  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5

  targetCPUUtilizationPercentage: 80

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5

config:
  LOG_LEVEL: INFO
  APP_NAME: python-service

secret:
  DATABASE_PASSWORD: change-me

env: {}

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
