name: Repository Onboarding

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project Name (e.g., nextops)'
        required: true
        type: string
      service_name:
        description: 'Service / Repository Name (e.g., user-service)'
        required: true
        type: string
      python_version:
        description: 'Python Version'
        required: true
        type: string
        default: '3.12'
        options:
          - '3.11'
          - '3.12'
          - '3.13'
      description:
        description: 'Service Description'
        required: false
        type: string
        default: 'Microservice managed via Nexturn RCS automation'

jobs:
  provision-and-scaffold:
    runs-on: ubuntu-latest
   
    steps:
      # 1. Pull down the self-service management repository files
      - name: Checkout Self-Service Repo
        uses: actions/checkout@v4

      # 2. Setup Python environment on the virtual worker runner
      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      # 3. Clone the destination project area as a blank path placeholder
      - name: Prepare Local App Workspace
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
        run: |
          mkdir workspace_repo
          echo "Workspace prepared for Python engine generation process."

      # 4. Trigger our Python automation program script
      - name: Run Python Onboarding Engine
        env:
          PLATFORM_AUTOMATION_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          PYTHON_VERSION: ${{ github.event.inputs.python_version }}
          DESCRIPTION: ${{ github.event.inputs.description }}
        run: |
          python bootstrap.py

      # 5. Push compiled template files into the newly created GitHub repository
      - name: Push Initial Boilerplate Code to Develop Branch
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
        run: |
          cd workspace_repo
         
          # Initialize local git tracing parameters inside workspace directory
          git init
          git checkout -b develop
         
          # Stage and commit all processed files generated by Python
          git config user.name "Platform Automation Bot"
          git config user.email "platform-team@nexturn.com"
          git add .
          git commit -m "bootstrap: initial boilerplate generation from template"
         
          # Attach remote organization location path origin address
          git remote add origin "https://x-access-token:${{ secrets.PLATFORM_AUTOMATION_TOKEN }}@github.com/nexturn-rcs/${{ github.event.inputs.service_name }}.git"
         
          # Force push to upstream default target branch branch configuration rules
          git push -u origin develop --force
         
          # Update target repository configurations default landing branch via GitHub API
          gh repo edit "nexturn-rcs/${{ github.event.inputs.service_name }}" --default-branch develop

      # 6. Push global variables and organization deployment targets down to application
      - name: Propagate Repository Configuration Details
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          REPO_SLUG: "nexturn-rcs/${{ github.event.inputs.service_name }}"
        run: |
          echo "Setting infrastructure parameter tags on $REPO_SLUG..."
          gh variable set PROJECT_NAME --body "${{ github.event.inputs.project_name }}" --repo "$REPO_SLUG"
          gh variable set PYTHON_VER --body "${{ github.event.inputs.python_version }}" --repo "$REPO_SLUG"
          gh variable set ACR_NAME --body "nextopsacrdemo" --repo "$REPO_SLUG"
          gh variable set DEPLOY_TARGET --body "AKS" --repo "$REPO_SLUG"

      # 7. Apply subscription encryption security certificates
      - name: Propagate Global Cloud Infrastructure Secrets
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          REPO_SLUG: "nexturn-rcs/${{ github.event.inputs.service_name }}"
          AZURE_CLIENT_ID: ${{ secrets.GLOBAL_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.GLOBAL_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.GLOBAL_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.GLOBAL_AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "Setting access tokens on $REPO_SLUG..."
          
          # Create the structured Azure JSON payload string
          AZURE_JSON_CREDS='{"clientId":"'"$AZURE_CLIENT_ID"'","clientSecret":"'"$AZURE_CLIENT_SECRET"'","subscriptionId":"'"$AZURE_SUBSCRIPTION_ID"'","tenantId":"'"$AZURE_TENANT_ID"'"}'
          
          # Push the single combined secret that azure/login expects!
          gh secret set AZURE_CREDENTIALS --body "$AZURE_JSON_CREDS" --repo "$REPO_SLUG"
          
          # Keep the individual ones as well just in case individual scripts need them
          gh secret set AZURE_CLIENT_ID --body "$AZURE_CLIENT_ID" --repo "$REPO_SLUG"
          gh secret set AZURE_CLIENT_SECRET --body "$AZURE_CLIENT_SECRET" --repo "$REPO_SLUG"
          gh secret set AZURE_TENANT_ID --body "$AZURE_TENANT_ID" --repo "$REPO_SLUG"
          gh secret set AZURE_SUBSCRIPTION_ID --body "$AZURE_SUBSCRIPTION_ID" --repo "$REPO_SLUG"