name: Repository Onboarding

on:
  repository_dispatch:
    types: [servicenow-repo-request]

  workflow_dispatch:
    inputs:
      project_name:
        description: "Project Name (e.g., nextops)"
        required: true
        type: string
      service_name:
        description: "Service / Repository Name (e.g., user-service)"
        required: true
        type: string
      python_version:
        description: "Python Version"
        required: true
        type: string
        default: "3.12"
      description:
        description: "Service Description"
        required: false
        type: string
        default: "Microservice managed via Nexturn RCS automation"
      snow_ritm_number:
        description: "ServiceNow RITM number (optional for manual test)"
        required: false
        type: string
      snow_ritm_sys_id:
        description: "ServiceNow RITM sys_id (optional)"
        required: false
        type: string

jobs:
  provision-and-scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Inputs
        id: inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "project_name=${{ github.event.client_payload.project_name }}" >> "$GITHUB_OUTPUT"
            echo "service_name=${{ github.event.client_payload.service_name }}" >> "$GITHUB_OUTPUT"
            echo "python_version=${{ github.event.client_payload.python_version }}" >> "$GITHUB_OUTPUT"
            echo "description=${{ github.event.client_payload.description }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ github.event.client_payload.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=${{ github.event.client_payload.snow_ritm_sys_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_name=${{ github.event.inputs.project_name }}" >> "$GITHUB_OUTPUT"
            echo "service_name=${{ github.event.inputs.service_name }}" >> "$GITHUB_OUTPUT"
            echo "python_version=${{ github.event.inputs.python_version }}" >> "$GITHUB_OUTPUT"
            echo "description=${{ github.event.inputs.description }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ github.event.inputs.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=${{ github.event.inputs.snow_ritm_sys_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Self-Service Repo
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Script Dependencies
        run: pip install requests

      - name: Prepare Local App Workspace
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
        run: |
          mkdir workspace_repo
          echo "Workspace prepared for Python engine generation process."

      - name: Run Python Onboarding Engine
        env:
          PLATFORM_AUTOMATION_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          SERVICE_NAME: ${{ steps.inputs.outputs.service_name }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project_name }}
          PYTHON_VERSION: ${{ steps.inputs.outputs.python_version }}
          DESCRIPTION: ${{ steps.inputs.outputs.description }}
        run: |
          python bootstrap.py

      - name: Push Initial Boilerplate Code to Develop Branch
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          SERVICE_NAME: ${{ steps.inputs.outputs.service_name }}
        run: |
          cd workspace_repo
          git init
          git checkout -b develop
          git config user.name "Platform Automation Bot"
          git config user.email "platform-team@nexturn.com"
          git add .
          git commit -m "bootstrap: initial boilerplate generation from template"
          git remote add origin "https://x-access-token:${{ secrets.PLATFORM_AUTOMATION_TOKEN }}@github.com/nexturn-rcs/${{ steps.inputs.outputs.service_name }}.git"
          git push -u origin develop --force
          gh repo edit "nexturn-rcs/${{ steps.inputs.outputs.service_name }}" --default-branch develop

      - name: Propagate Repository Configuration Details
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          REPO_SLUG: "nexturn-rcs/${{ steps.inputs.outputs.service_name }}"
        run: |
          echo "Setting infrastructure parameter tags on $REPO_SLUG..."
          gh variable set PROJECT_NAME --body "${{ steps.inputs.outputs.project_name }}" --repo "$REPO_SLUG"
          gh variable set PYTHON_VER --body "${{ steps.inputs.outputs.python_version }}" --repo "$REPO_SLUG"
          gh variable set ACR_NAME --body "nextopsacrdemo" --repo "$REPO_SLUG"
          gh variable set DEPLOY_TARGET --body "AKS" --repo "$REPO_SLUG"

      - name: Propagate Global Cloud Infrastructure Secrets
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          REPO_SLUG: "nexturn-rcs/${{ steps.inputs.outputs.service_name }}"
          AZURE_CLIENT_ID: ${{ secrets.GLOBAL_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.GLOBAL_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.GLOBAL_AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.GLOBAL_AZURE_SUBSCRIPTION_ID }}
        run: |
          echo "Setting access tokens on $REPO_SLUG..."
          AZURE_JSON_CREDS='{"clientId":"'"$AZURE_CLIENT_ID"'","clientSecret":"'"$AZURE_CLIENT_SECRET"'","subscriptionId":"'"$AZURE_SUBSCRIPTION_ID"'","tenantId":"'"$AZURE_TENANT_ID"'"}'
          gh secret set AZURE_CREDENTIALS --body "$AZURE_JSON_CREDS" --repo "$REPO_SLUG"
          gh secret set AZURE_CLIENT_ID --body "$AZURE_CLIENT_ID" --repo "$REPO_SLUG"
          gh secret set AZURE_CLIENT_SECRET --body "$AZURE_CLIENT_SECRET" --repo "$REPO_SLUG"
          gh secret set AZURE_TENANT_ID --body "$AZURE_TENANT_ID" --repo "$REPO_SLUG"
          gh secret set AZURE_SUBSCRIPTION_ID --body "$AZURE_SUBSCRIPTION_ID" --repo "$REPO_SLUG"

      - name: ServiceNow - Mark Success And Close Ticket
        if: ${{ success() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '') }}
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          REPO_NAME: ${{ steps.inputs.outputs.service_name }}
        run: |
          python scripts/update_snow_ritm.py --mode success

      - name: ServiceNow - Mark Failed
        if: ${{ failure() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '') }}
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          REPO_NAME: ${{ steps.inputs.outputs.service_name }}
        run: |
          python scripts/update_snow_ritm.py --mode failed