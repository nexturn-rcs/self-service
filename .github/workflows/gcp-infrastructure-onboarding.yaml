name: GCP Infrastructure Onboarding

on:
  repository_dispatch:
    types: [servicenow-gcp-infra-request]

  workflow_dispatch:
    inputs:
      ticket:
        description: Ticket Number (e.g. RITM number)
        required: true
        type: string

      project:
        description: Project Name (must start with nextops)
        required: true
        type: string

      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

      region:
        description: GCP Region
        required: true
        default: us-central1
        type: string

      enable_gke:
        description: Enable GKE (Kubernetes)
        required: true
        type: boolean

      enable_storage:
        description: Enable Cloud Storage (GCS)
        required: true
        type: boolean

      enable_sql:
        description: Enable Cloud SQL
        required: true
        type: boolean

      enable_secret_manager:
        description: Enable Secret Manager
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  create-gcp-project:
    runs-on: ubuntu-latest

    steps:

      #####################################################################
      # Resolve inputs from either dispatch trigger or manual form
      #####################################################################

      - name: Resolve Inputs
        id: inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ticket=${{ github.event.client_payload.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "project=${{ github.event.client_payload.project_name }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
            echo "region=${{ github.event.client_payload.region }}" >> "$GITHUB_OUTPUT"
            echo "enable_gke=${{ github.event.client_payload.enable_gke }}" >> "$GITHUB_OUTPUT"
            echo "enable_storage=${{ github.event.client_payload.enable_storage }}" >> "$GITHUB_OUTPUT"
            echo "enable_sql=${{ github.event.client_payload.enable_sql }}" >> "$GITHUB_OUTPUT"
            echo "enable_secret_manager=${{ github.event.client_payload.enable_secret_manager }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ github.event.client_payload.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=${{ github.event.client_payload.snow_ritm_sys_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "ticket=${{ inputs.ticket }}" >> "$GITHUB_OUTPUT"
            echo "project=${{ inputs.project }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "region=${{ inputs.region }}" >> "$GITHUB_OUTPUT"
            echo "enable_gke=${{ inputs.enable_gke }}" >> "$GITHUB_OUTPUT"
            echo "enable_storage=${{ inputs.enable_storage }}" >> "$GITHUB_OUTPUT"
            echo "enable_sql=${{ inputs.enable_sql }}" >> "$GITHUB_OUTPUT"
            echo "enable_secret_manager=${{ inputs.enable_secret_manager }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ inputs.ticket }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=" >> "$GITHUB_OUTPUT"
          fi

      #####################################################################
      # Validate project name
      #####################################################################

      - name: Validate Project Name
        shell: bash
        run: |
          PROJECT="${{ steps.inputs.outputs.project }}"
          if [[ "$PROJECT" != nextops* ]]; then
            echo "::error::Project name must start with 'nextops'. Got: $PROJECT"
            exit 1
          fi

      - name: Set Environment Variables
        shell: bash
        run: |
          echo "PROJECT_NAME=${{ steps.inputs.outputs.project }}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT=${{ steps.inputs.outputs.environment }}" >> "$GITHUB_ENV"
          echo "REGION=${{ steps.inputs.outputs.region }}" >> "$GITHUB_ENV"
          echo "ENABLE_GKE=${{ steps.inputs.outputs.enable_gke }}" >> "$GITHUB_ENV"
          echo "ENABLE_STORAGE=${{ steps.inputs.outputs.enable_storage }}" >> "$GITHUB_ENV"
          echo "ENABLE_SQL=${{ steps.inputs.outputs.enable_sql }}" >> "$GITHUB_ENV"
          echo "ENABLE_SECRET_MANAGER=${{ steps.inputs.outputs.enable_secret_manager }}" >> "$GITHUB_ENV"
          echo "GCP_PROJECT_FOLDER=${{ steps.inputs.outputs.project }}-${{ steps.inputs.outputs.environment }}" >> "$GITHUB_ENV"
          echo "GCP_PROJECT_ID=${{ steps.inputs.outputs.project }}-${{ steps.inputs.outputs.environment }}" >> "$GITHUB_ENV"

      #####################################################################
      # Checkout self-service repo (contains gcp-composer templates)
      #####################################################################

      - name: Checkout IDP Repository
        uses: actions/checkout@v4
        with:
          path: idp

      #####################################################################
      # Checkout gcp-infrastructure repository
      #####################################################################

      - name: Checkout GCP Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: nexturn-rcs/gcp-infrastructure
          token: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          path: gcp-infra

      #####################################################################
      # Install envsubst
      #####################################################################

      - name: Install gettext
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      #####################################################################
      # Create project folder and copy templates
      #####################################################################

      - name: Generate GCP Project Files
        run: |
          echo "GCP Project Folder: ${GCP_PROJECT_FOLDER}"

          mkdir -p "gcp-infra/projects/${GCP_PROJECT_FOLDER}"

          cp -R \
            idp/templates/gcp-composer/. \
            "gcp-infra/projects/${GCP_PROJECT_FOLDER}/"

      #####################################################################
      # Apply envsubst to every template file
      #####################################################################

      - name: Apply Template Variables
        run: |
          find "gcp-infra/projects/${GCP_PROJECT_FOLDER}" \
            -type f | while read -r file
          do
            echo "Processing $file"
            envsubst < "$file" > "${file}.tmp"
            mv "${file}.tmp" "$file"
          done

      #####################################################################
      # Show generated files (for debugging)
      #####################################################################

      - name: Show Generated Files
        run: |
          echo "Generated content"
          find "gcp-infra/projects/${GCP_PROJECT_FOLDER}" \
            -type f \
            -exec echo "==== {} ====" \; \
            -exec cat {} \;

      #####################################################################
      # Create PR in gcp-infrastructure repository
      #####################################################################

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          path: gcp-infra
          branch: feature/${{ steps.inputs.outputs.ticket }}
          base: develop
          delete-branch: false
          commit-message: |
            ${{ steps.inputs.outputs.ticket }}: Add ${{ env.GCP_PROJECT_FOLDER }}
          title: |
            ${{ steps.inputs.outputs.ticket }}: Add ${{ env.GCP_PROJECT_FOLDER }}
          body: |
            ## GCP Project Provisioning Request

            ### Project
            Project Name : ${{ steps.inputs.outputs.project }}
            Environment  : ${{ steps.inputs.outputs.environment }}
            GCP Region   : ${{ steps.inputs.outputs.region }}
            Project ID   : `${{ env.GCP_PROJECT_ID }}`

            ### Enabled Services

            | Service | Enabled |
            |---------|---------|
            | GKE (Kubernetes) | ${{ steps.inputs.outputs.enable_gke }} |
            | Cloud Storage    | ${{ steps.inputs.outputs.enable_storage }} |
            | Cloud SQL        | ${{ steps.inputs.outputs.enable_sql }} |
            | Secret Manager   | ${{ steps.inputs.outputs.enable_secret_manager }} |

            Generated automatically by Platform Team.

          labels: |
            automation
            infrastructure
            gcp

      #####################################################################
      # ServiceNow ticket updates
      #####################################################################

      - name: Setup Python
        if: steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Script Dependencies
        if: steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != ''
        run: pip install requests

      - name: ServiceNow - Update Ticket With PR Details
        if: success() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '')
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project }}
          GCP_PROJECT_FOLDER: ${{ env.GCP_PROJECT_FOLDER }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          python idp/scripts/update_snow_gcp.py --mode pr_created

      - name: ServiceNow - Mark Failed
        if: failure() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '')
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project }}
          GCP_PROJECT_FOLDER: ${{ env.GCP_PROJECT_FOLDER }}
        run: |
          python idp/scripts/update_snow_gcp.py --mode failed
