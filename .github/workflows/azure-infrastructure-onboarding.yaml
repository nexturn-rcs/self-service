name: Service Composer

on:
  repository_dispatch:
    types: [servicenow-azure-infra-request]

  workflow_dispatch:
    inputs:
      ticket:
        description: Ticket Number (e.g. OTIS-123 or RITM number)
        required: true
        type: string

      project:
        description: Project Name (must start with nextops)
        required: true
        type: string

      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

      location:
        description: Azure Location
        required: true
        default: eastus
        type: string

      enable_aks:
        description: Enable AKS
        required: true
        type: boolean

      enable_storage:
        description: Enable Storage
        required: true
        type: boolean

      enable_sql:
        description: Enable SQL
        required: true
        type: boolean

      enable_keyvault:
        description: Enable KeyVault
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  create-resource-group:
    runs-on: ubuntu-latest

    steps:
      #####################################################################
      # Resolve inputs from either dispatch trigger or manual form
      #####################################################################

      - name: Resolve Inputs
        id: inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ticket=${{ github.event.client_payload.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "project=${{ github.event.client_payload.project_name }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
            echo "location=${{ github.event.client_payload.location }}" >> "$GITHUB_OUTPUT"
            echo "enable_aks=${{ github.event.client_payload.enable_aks }}" >> "$GITHUB_OUTPUT"
            echo "enable_storage=${{ github.event.client_payload.enable_storage }}" >> "$GITHUB_OUTPUT"
            echo "enable_sql=${{ github.event.client_payload.enable_sql }}" >> "$GITHUB_OUTPUT"
            echo "enable_keyvault=${{ github.event.client_payload.enable_keyvault }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ github.event.client_payload.snow_ritm_number }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=${{ github.event.client_payload.snow_ritm_sys_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "ticket=${{ inputs.ticket }}" >> "$GITHUB_OUTPUT"
            echo "project=${{ inputs.project }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "location=${{ inputs.location }}" >> "$GITHUB_OUTPUT"
            echo "enable_aks=${{ inputs.enable_aks }}" >> "$GITHUB_OUTPUT"
            echo "enable_storage=${{ inputs.enable_storage }}" >> "$GITHUB_OUTPUT"
            echo "enable_sql=${{ inputs.enable_sql }}" >> "$GITHUB_OUTPUT"
            echo "enable_keyvault=${{ inputs.enable_keyvault }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_number=${{ inputs.ticket }}" >> "$GITHUB_OUTPUT"
            echo "snow_ritm_sys_id=" >> "$GITHUB_OUTPUT"
          fi

      #####################################################################
      # Validate project name
      #####################################################################

      - name: Validate Project Name
        shell: bash
        run: |
          PROJECT="${{ steps.inputs.outputs.project }}"
          if [[ "$PROJECT" != nextops* ]]; then
            echo "::error::Project name must start with 'nextops'. Got: $PROJECT"
            exit 1
          fi

      - name: Set Environment Variables
        id: vars
        shell: bash
        run: |
          echo "TICKET=${{ steps.inputs.outputs.ticket }}" >> "$GITHUB_ENV"
          echo "PROJECT_NAME=${{ steps.inputs.outputs.project }}" >> "$GITHUB_ENV"
          echo "ENVIRONMENT=${{ steps.inputs.outputs.environment }}" >> "$GITHUB_ENV"
          echo "LOCATION=${{ steps.inputs.outputs.location }}" >> "$GITHUB_ENV"
          echo "ENABLE_AKS=${{ steps.inputs.outputs.enable_aks }}" >> "$GITHUB_ENV"
          echo "ENABLE_STORAGE=${{ steps.inputs.outputs.enable_storage }}" >> "$GITHUB_ENV"
          echo "ENABLE_SQL=${{ steps.inputs.outputs.enable_sql }}" >> "$GITHUB_ENV"
          echo "ENABLE_KEYVAULT=${{ steps.inputs.outputs.enable_keyvault }}" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=rg-${{ steps.inputs.outputs.project }}-${{ steps.inputs.outputs.environment }}" >> "$GITHUB_ENV"

      #####################################################################
      # Checkout current repo (contains templates/service-composer)
      #####################################################################

      - name: Checkout IDP Repository
        uses: actions/checkout@v6
        with:
          path: idp

      #####################################################################
      # Checkout target repository
      #####################################################################

      - name: Checkout Azure Infrastructure Repository
        uses: actions/checkout@v6
        with:
          repository: nexturn-rcs/azure-infrastructure
          token: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          path: azure-infra

      #####################################################################
      # Install envsubst
      #####################################################################

      - name: Install gettext
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      #####################################################################
      # Create RG folder and copy templates
      #####################################################################

      - name: Generate Resource Group Files
        run: |

          echo "Resource Group: ${RESOURCE_GROUP}"

          mkdir -p \
            "azure-infra/resource_groups/${RESOURCE_GROUP}"

          cp -R \
            idp/templates/service-composer/. \
            "azure-infra/resource_groups/${RESOURCE_GROUP}/"

      #####################################################################
      # Apply envsubst to every template file
      #####################################################################

      - name: Apply Template Variables
        run: |

          find "azure-infra/resource_groups/${RESOURCE_GROUP}" \
            -type f | while read -r file
          do
            echo "Processing $file"

            envsubst < "$file" > "${file}.tmp"

            mv "${file}.tmp" "$file"
          done

      #####################################################################
      # Show generated files (for debugging)
      #####################################################################

      - name: Show Generated Files
        run: |

          echo "Generated content"

          find \
            "azure-infra/resource_groups/${RESOURCE_GROUP}" \
            -type f \
            -exec echo "==== {} ====" \; \
            -exec cat {} \;

      #####################################################################
      # Create PR in azure-infrastructure repository
      #####################################################################

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PLATFORM_AUTOMATION_TOKEN }}
          path: azure-infra
          branch: feature/${{ steps.inputs.outputs.ticket }}
          base: develop
          delete-branch: true
          commit-message: |
            ${{ steps.inputs.outputs.ticket }}: Add ${{
            env.RESOURCE_GROUP }}
          title: |
            ${{ steps.inputs.outputs.ticket }}: Add ${{
            env.RESOURCE_GROUP }}
          body: |
            ## Resource Group Provisioning Request
            ### Project
            Project Name: ${{ steps.inputs.outputs.project }}
            Environment: ${{ steps.inputs.outputs.environment }}
            Location: ${{ steps.inputs.outputs.location }}
            Resource Group:
            `${{ env.RESOURCE_GROUP }}`
            ### Enabled Services

            | Service | Enabled |
            |----------|----------|
            | AKS | ${{ steps.inputs.outputs.enable_aks }} |
            | Storage | ${{ steps.inputs.outputs.enable_storage }} |
            | SQL | ${{ steps.inputs.outputs.enable_sql }} |
            | KeyVault | ${{ steps.inputs.outputs.enable_keyvault }} |

            Generated automatically by Platform Team.

          labels: |
            automation
            infrastructure
            service-composer

      #####################################################################
      # ServiceNow ticket updates
      #####################################################################

      - name: Setup Python
        if: ${{ steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Script Dependencies
        if: ${{ steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '' }}
        run: pip install requests

      - name: ServiceNow - Update Ticket With PR Details
        if: ${{ success() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '') }}
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          REPO_NAME: ${{ steps.inputs.outputs.project }}
          RESOURCE_GROUP: ${{ env.RESOURCE_GROUP }}
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          python idp/scripts/update_snow_azure.py --mode pr_created

      - name: ServiceNow - Mark Failed
        if: ${{ failure() && (steps.inputs.outputs.snow_ritm_number != '' || steps.inputs.outputs.snow_ritm_sys_id != '') }}
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
          RITM_NUMBER: ${{ steps.inputs.outputs.snow_ritm_number }}
          RITM_SYS_ID: ${{ steps.inputs.outputs.snow_ritm_sys_id }}
          REPO_NAME: ${{ steps.inputs.outputs.project }}
        run: |
          python idp/scripts/update_snow_azure.py --mode failed
